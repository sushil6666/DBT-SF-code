version: 2

models:
  - name: agg_daily_revenue
    description: Daily revenue breakdown with visitor counts and per-visitor spend
    columns:
      - name: date_day
        description: Calendar date of the visit
        tests:
          - unique
          - not_null
      - name: total_revenue
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: unique_visitors
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: agg_customer_lifetime_value
    description: CLV segmented by loyalty tier and customer value segment
    columns:
      - name: loyalty_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Gold', 'Silver', 'Bronze']
      - name: clv
        description: Average customer lifetime value for the segment
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: agg_ride_popularity
    description: Ride popularity rankings by review volume and average rating
    columns:
      - name: ride_key
        tests:
          - unique
          - not_null
      - name: rating_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Top Rated', 'Well Rated', 'Average', 'Below Average', 'Not Yet Rated']
      - name: review_volume_rank
        tests:
          - not_null
      - name: rating_rank
        tests:
          - not_null
