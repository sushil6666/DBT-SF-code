# Name your project! Project names should contain only lowercase characters
# and underscores. A good package is named after the intended use case.
name: 'dbt_practice'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_batch'

# These configurations specify where dbt should look for different types of files.
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  date_spine_start: '2020-01-01'
  date_spine_end:   '2026-12-31'

  # Filter for halloween spending analysis — override via CLI for narrower dev runs
  # e.g. dbt run --select agg_halloween_spending --vars '{"halloween_analysis_start_date": "2024-01-01"}'
  halloween_analysis_start_date: '2023-01-01'

  # Minimum satisfaction rating included in house happiness rankings
  # e.g. dbt run --select agg_happiest_houses --vars '{"min_satisfaction_rating": 4}'
  min_satisfaction_rating: 3

  # Snowflake role granted SELECT on all mart tables after each build
  # Override per environment in CI/CD job config
  bi_role: 'SYSADMIN'

seeds:
  dbt_practice:
    +schema: raw
    +quote_columns: false
    raw_customers:
      +column_types:
        customer_id: varchar
        membership_type: varchar
        signup_channel: varchar
    raw_rides:
      +column_types:
        ride_id: varchar
        ride_type: varchar
        thrill_level: varchar
        zone: varchar
        status: varchar
    raw_tickets:
      +column_types:
        ticket_id: varchar
        customer_id: varchar
        ticket_type: varchar
        purchase_channel: varchar
        promo_code: varchar
    raw_feedback:
      +column_types:
        feedback_id: varchar
        customer_id: varchar
        ride_id: varchar
        category: varchar
        sentiment: varchar
    raw_sales_transactions:
      +column_types:
        transaction_id: varchar
        customer_id: varchar
        category: varchar
        item_name: varchar
        payment_method: varchar
        location: varchar
    raw_employees:
      +column_types:
        employee_id: varchar
        manager_id: varchar
        department: varchar
        role: varchar
        zone_assignment: varchar
    raw_haunted_events:
      +column_types:
        event_id: varchar
        event_name: varchar
        event_type: varchar
        external_partner: varchar
        description: varchar

snapshots:
  dbt_practice:
    +target_schema: snapshots

models:
  dbt_practice:

    +query_tag: 'query_from_dbt'

    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging']

      customer_data:
        +tags: ['customer_data']
      park_assets:
        +tags: ['park_assets']
      sales:
        +tags: ['sales']
      external_haunted:
        +tags: ['external_haunted']
      feedback:
        +tags: ['feedback']

    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +tags: ['intermediate']

    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts']

      core:
        +tags: ['core']
      analytics:
        +tags: ['analytics']

    utilities:
      +materialized: table
      +schema: utilities
      +tags: ['utilities']

  # dbt_project_evaluator internal models incompatible with dbt-fusion (trailing comma SQL)
  dbt_project_evaluator:
    +enabled: false
