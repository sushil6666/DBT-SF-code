version: 2

seeds:

  - name: demo_21_sample_merge
    description: >
      Demo model: models/macro_demos/demo_21_incremental_merge.sql | Strategy: merge | Source: fct_all_ticket_sales.
      Sample output rows showing the target table state after an incremental merge.
      Rows SL1003 and SL1005 have updated_at newer than created_at, demonstrating the
      MATCHED → UPDATE branch (ticket_price corrected post-sale). merge_update_columns
      limits updates to price/discount columns — created_at is never overwritten.
    columns:
      - name: sale_id
        description: Unique ticket sale identifier (merge unique_key)
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer who purchased the ticket
        tests:
          - not_null
      - name: ticket_id
        description: Ticket associated with this sale
        tests:
          - not_null
      - name: purchase_date
        description: Date the ticket was purchased
        tests:
          - not_null
      - name: visit_date
        description: Date the customer plans to visit the park
        tests:
          - not_null
      - name: ticket_price
        description: Final ticket price after any discount
        tests:
          - not_null
      - name: discount_percent
        description: Discount percentage applied (0 = no discount)
        tests:
          - not_null
      - name: discount_category
        description: Bucketed discount label derived from discount_percent
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['No Discount', 'Low Discount', 'Mid Discount', 'High Discount']
      - name: visit_hour
        description: Hour of day (0-23) the customer visited
        tests:
          - not_null
      - name: payment_method
        description: Payment instrument used
        tests:
          - not_null
      - name: purchase_channel
        description: Channel through which the sale was made
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['online', 'in_park', 'kiosk', 'phone']
      - name: is_online
        description: TRUE if the purchase channel is online
        tests:
          - not_null
      - name: same_day_visit
        description: TRUE when purchase_date equals visit_date
        tests:
          - not_null
      - name: advance_purchase
        description: TRUE when visit_date is after purchase_date
        tests:
          - not_null
      - name: visit_time_category
        description: Named time slot derived from visit_hour (Morning/Afternoon/Evening/Night)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Morning', 'Afternoon', 'Evening', 'Night']
      - name: business_season
        description: Business season derived from visit_date month
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Halloween Season', 'Summer', 'Winter', 'Spring', 'Fall']
      - name: created_at
        description: Timestamp when the row was first inserted (never overwritten by merge)
        tests:
          - not_null
      - name: updated_at
        description: Watermark column — drives the is_incremental() filter; changes on every price update
        tests:
          - not_null

  - name: demo_22_sample_append
    description: >
      Demo model: models/macro_demos/demo_22_incremental_append.sql | Strategy: append | Source: fct_sales.
      Sample output rows for the growing immutable in-park sales ledger. Each run appends
      rows where visit_date > max(visit_date) already in the table. full_refresh=false on
      the model prevents accidental truncation. _loaded_at enables duplicate-ingestion detection.
    columns:
      - name: sales_key
        description: Surrogate key — MD5 hash of transaction_id (generated by dbt_utils)
        tests:
          - not_null
          - unique
      - name: transaction_id
        description: Source transaction identifier
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer who made the purchase
        tests:
          - not_null
      - name: visit_date
        description: Date of the park visit (watermark column)
        tests:
          - not_null
      - name: day_of_week
        description: Day name (Monday–Sunday) from dim_dates
        tests:
          - not_null
      - name: month_name
        description: Month name from dim_dates
        tests:
          - not_null
      - name: quarter
        description: Calendar quarter (1–4) from dim_dates
        tests:
          - not_null
      - name: year
        description: Calendar year from dim_dates
        tests:
          - not_null
      - name: is_weekend
        description: TRUE if the visit fell on Saturday or Sunday
        tests:
          - not_null
      - name: category
        description: Sales category (food, merchandise, game, photo)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['food', 'merchandise', 'game', 'photo']
      - name: item_name
        description: Name of the purchased item
        tests:
          - not_null
      - name: quantity
        description: Number of units purchased
        tests:
          - not_null
      - name: unit_price
        description: Price per unit at time of purchase
        tests:
          - not_null
      - name: total_amount
        description: quantity * unit_price
        tests:
          - not_null
      - name: payment_method
        description: Payment instrument used
        tests:
          - not_null
      - name: location
        description: Park location where the sale occurred
        tests:
          - not_null
      - name: _loaded_at
        description: Timestamp stamped at query execution time; enables duplicate-ingestion detection
        tests:
          - not_null

  - name: demo_23_sample_delete_insert
    description: >
      Demo model: models/macro_demos/demo_23_incremental_delete_insert.sql | Strategy: delete+insert | Source: fct_visits.
      Sample output rows for the daily aggregated visit summary. unique_key=visit_date is the
      partition boundary (not a row-level PK) — all rows sharing a visit_date are deleted and
      rewritten together. Each run reprocesses the last 3 days to absorb late-arriving records.
    columns:
      - name: visit_date
        description: Date of park visit — also the delete+insert partition column (unique_key)
        tests:
          - not_null
      - name: ticket_type
        description: Category of ticket held by visitors on this date
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['day_pass', 'weekend_pass', 'annual_pass', 'group_pass']
      - name: unique_visitors
        description: Count of distinct customer_ids for this date and ticket_type
        tests:
          - not_null
      - name: total_visits
        description: Total visit records (includes repeat same-day entries)
        tests:
          - not_null
      - name: total_ticket_revenue
        description: Sum of ticket_price for this date and ticket_type
        tests:
          - not_null
      - name: total_in_park_spend
        description: Sum of in_park_spend (food, merchandise, games)
        tests:
          - not_null
      - name: total_visit_spend
        description: Total spend including ticket price and in-park spend
        tests:
          - not_null
      - name: avg_satisfaction_rating
        description: Average guest satisfaction rating (1–5 scale)
        tests:
          - not_null
      - name: min_ticket_price
        description: Lowest individual ticket price recorded on this date
        tests:
          - not_null
      - name: max_ticket_price
        description: Highest individual ticket price recorded on this date
        tests:
          - not_null

  - name: demo_24_sample_insert_overwrite
    description: >
      Demo model: models/macro_demos/demo_24_incremental_insert_overwrite.sql | Strategy: insert_overwrite | Source: fct_sales.
      Sample output rows for the monthly revenue rollup. revenue_month is always the first of the
      month (date_trunc result). cluster_by=revenue_month is required on the model — without it,
      INSERT OVERWRITE replaces the entire table. Each run overwrites current + prior month only.
    columns:
      - name: revenue_month
        description: First day of the calendar month (date_trunc result — the overwrite partition key)
        tests:
          - not_null
      - name: category
        description: Sales category (food, merchandise, game, photo)
        tests:
          - not_null
      - name: location
        description: Park location where sales occurred
        tests:
          - not_null
      - name: payment_method
        description: Payment instrument group
        tests:
          - not_null
      - name: total_revenue
        description: Sum of total_amount for this month / category / location / payment slice
        tests:
          - not_null
      - name: total_units_sold
        description: Sum of quantity
        tests:
          - not_null
      - name: total_transactions
        description: Count of distinct transaction_ids
        tests:
          - not_null
      - name: unique_customers
        description: Count of distinct customer_ids
        tests:
          - not_null
      - name: avg_transaction_value
        description: Average total_amount per transaction
        tests:
          - not_null
      - name: max_transaction_value
        description: Highest single transaction value in this slice
        tests:
          - not_null

  - name: demo_25_sample_microbatch
    description: >
      Demo model: models/macro_demos/demo_25_incremental_microbatch.sql | Strategy: microbatch | Source: fct_all_ticket_sales.
      Sample output rows for a daily batch window of ticket sales. dbt injects the WHERE filter
      automatically (purchase_ts >= batch_start AND purchase_ts < batch_end) — no is_incremental()
      block exists in the model. purchase_ts = purchase_date::TIMESTAMP_NTZ (event_time column).
    columns:
      - name: sale_id
        description: Unique ticket sale identifier
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer who purchased the ticket
        tests:
          - not_null
      - name: ticket_id
        description: Ticket associated with this sale
        tests:
          - not_null
      - name: purchase_date
        description: Calendar date of purchase (used for cluster_by)
        tests:
          - not_null
      - name: purchase_ts
        description: Timestamp of purchase (purchase_date cast to TIMESTAMP_NTZ) — the microbatch event_time column
        tests:
          - not_null
      - name: visit_date
        description: Date the customer will visit the park
        tests:
          - not_null
      - name: ticket_price
        description: Final price paid for the ticket
        tests:
          - not_null
      - name: discount_percent
        description: Discount percentage applied (0 = no discount)
        tests:
          - not_null
      - name: discount_category
        description: Bucketed discount label derived from discount_percent
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['No Discount', 'Low Discount', 'Mid Discount', 'High Discount']
      - name: payment_method
        description: Payment instrument used
        tests:
          - not_null
      - name: purchase_channel
        description: Channel through which the sale was made
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['online', 'in_park', 'kiosk', 'phone']
      - name: is_online
        description: TRUE if purchase channel is online
        tests:
          - not_null
      - name: same_day_visit
        description: TRUE when purchase_date equals visit_date
        tests:
          - not_null
      - name: advance_purchase
        description: TRUE when visit_date is after purchase_date
        tests:
          - not_null
      - name: visit_time_category
        description: Named time slot derived from visit_hour
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Morning', 'Afternoon', 'Evening', 'Night']
      - name: business_season
        description: Business season derived from visit_date month
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Halloween Season', 'Summer', 'Winter', 'Spring', 'Fall']
      - name: updated_at
        description: Row update timestamp from the source system
        tests:
          - not_null
